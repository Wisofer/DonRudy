# ─── nixpacks.toml ─────────────────────────────────────────────────────────
# Configuración para deploy en Dokploy via Nixpacks
# Node.js 20 LTS — Next.js 16 standalone production build

[variables]
NIXPACKS_NODE_VERSION = "20"
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install --legacy-peer-deps"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"
